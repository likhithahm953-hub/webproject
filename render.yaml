services:
  - type: web
    name: skillforge
    env: python
    plan: free
    buildCommand: npm install --omit=dev && pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: skillforge-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: LAUNCH_PIPELINE_TIMEOUT_SECONDS
        value: 5
      - key: TEST_ALERT_INTERVAL_MINUTES
        value: 300
      - key: COURSE_COMPLETION_MINUTES
        value: 300
      - key: QUIZ_PASS_THRESHOLD
        value: 70
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      - key: EMAIL_PROVIDER
        value: "nodemailer"
      - key: RESEND_API_KEY
        sync: false
      - key: NODEMAILER_USE_AUTH
        value: "true"
      - key: NODEMAILER_HOST
        sync: false
      - key: NODEMAILER_PORT
        sync: false
      - key: NODEMAILER_USER
        sync: false
      - key: NODEMAILER_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SERVER_BASE_URL
        sync: false
      - key: NODEMAILER_ALLOW_INSECURE
        value: "false"
      - key: EMAIL_VERIFICATION_EXPIRY_SECONDS
        value: "900"
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: skillforge-db
    plan: free
