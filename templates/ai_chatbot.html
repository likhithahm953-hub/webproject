<!-- AI Chatbot Widget -->
<div class="ai-chatbot-widget" id="ai-chatbot">
  <button class="chatbot-toggle" id="chatbot-toggle" title="Chat with AI Assistant">
    <i class="fa-solid fa-robot"></i>
    <span class="chatbot-pulse"></span>
  </button>
  
  <div class="chatbot-window" id="chatbot-window">
    <div class="chatbot-header">
      <div class="chatbot-header-info">
        <div class="chatbot-avatar">
          <i class="fa-solid fa-robot"></i>
        </div>
        <div class="chatbot-title">
          <h4>AI Assistant</h4>
          <span class="chatbot-status">
            <span class="status-dot"></span> Online
          </span>
        </div>
      </div>
      <div class="chatbot-actions">
        <button class="chatbot-action-btn" id="minimize-chatbot" title="Minimize">
          <i class="fa-solid fa-minus"></i>
        </button>
        <button class="chatbot-action-btn" id="close-chatbot" title="Close">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>
    
    <div class="chatbot-messages" id="chatbot-messages">
      <div class="chat-message bot">
        <div class="message-avatar">
          <i class="fa-solid fa-robot"></i>
        </div>
        <div class="message-content">
          <p>Hello! I'm your AI learning assistant. How can I help you today?</p>
          <span class="message-time">Just now</span>
        </div>
      </div>
      
      <div class="chat-suggestions">
        <button class="suggestion-chip" data-message="Recommend a course for me">
          <i class="fa-solid fa-book"></i> Recommend a course
        </button>
        <button class="suggestion-chip" data-message="How am I doing?">
          <i class="fa-solid fa-chart-line"></i> My progress
        </button>
        <button class="suggestion-chip" data-message="What should I learn next?">
          <i class="fa-solid fa-compass"></i> What's next?
        </button>
        <button class="suggestion-chip" data-message="Help me with a challenge">
          <i class="fa-solid fa-lightbulb"></i> Get help
        </button>
      </div>
    </div>
    
    <div class="chatbot-input">
      <button class="input-action-btn" title="Attach file">
        <i class="fa-solid fa-paperclip"></i>
      </button>
      <input type="text" placeholder="Ask me anything..." id="chatbot-input-field" />
      <button class="input-send-btn" id="chatbot-send-btn" title="Send message">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>

<style>
/* AI Chatbot Widget Styles */
.ai-chatbot-widget {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
}

.chatbot-toggle {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  border: none;
  color: white;
  font-size: 1.5rem;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
  transition: all 0.3s ease;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chatbot-toggle:hover {
  transform: scale(1.1);
  box-shadow: 0 12px 32px rgba(99, 102, 241, 0.6);
}

.chatbot-pulse {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 3px solid var(--accent-primary);
  animation: pulse 2s infinite;
  opacity: 0.5;
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.5;
  }
  50% {
    transform: scale(1.15);
    opacity: 0;
  }
}

.chatbot-window {
  position: absolute;
  bottom: 80px;
  right: 0;
  width: 380px;
  height: 550px;
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  display: none;
  flex-direction: column;
  overflow: hidden;
  animation: slideUp 0.3s ease;
}

.chatbot-window.open {
  display: flex;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.chatbot-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  color: white;
}

.chatbot-header-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.chatbot-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
}

.chatbot-title h4 {
  margin: 0;
  font-size: 1rem;
  font-weight: 600;
}

.chatbot-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.8rem;
  opacity: 0.9;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #10b981;
  animation: blink 2s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.chatbot-actions {
  display: flex;
  gap: 8px;
}

.chatbot-action-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.1);
  border: none;
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chatbot-action-btn:hover {
  background: rgba(255, 255, 255, 0.2);
}

.chatbot-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.chat-message {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.chat-message.user {
  flex-direction: row-reverse;
}

.message-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1rem;
  flex-shrink: 0;
}

.chat-message.user .message-avatar {
  background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
}

.message-content {
  max-width: 70%;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.chat-message.user .message-content {
  align-items: flex-end;
}

.message-content p {
  background: rgba(255, 255, 255, 0.05);
  padding: 12px 16px;
  border-radius: 12px;
  margin: 0;
  color: var(--text-primary);
  line-height: 1.5;
}

.chat-message.user .message-content p {
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  color: white;
}

.message-time {
  font-size: 0.7rem;
  color: var(--text-muted);
  padding: 0 4px;
}

.chat-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}

.suggestion-chip {
  padding: 8px 16px;
  background: rgba(99, 102, 241, 0.1);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  color: var(--text-primary);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}

.suggestion-chip:hover {
  background: rgba(99, 102, 241, 0.2);
  border-color: var(--accent-primary);
  transform: translateY(-2px);
}

.chatbot-input {
  display: flex;
  gap: 8px;
  padding: 16px 20px;
  border-top: 1px solid var(--border-color);
  background: var(--bg-secondary);
}

.input-action-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.input-action-btn:hover {
  background: rgba(99, 102, 241, 0.1);
  border-color: var(--accent-primary);
  color: var(--accent-primary);
}

#chatbot-input-field {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--text-primary);
  font-size: 0.9rem;
  outline: none;
  transition: all 0.3s ease;
}

#chatbot-input-field:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.input-send-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  border: none;
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.input-send-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
}

.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  width: fit-content;
}

.typing-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: typing 1.4s infinite;
}

.typing-dot:nth-child(2) {
  animation-delay: 0.2s;
}

.typing-dot:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes typing {
  0%, 60%, 100% {
    transform: translateY(0);
    opacity: 0.7;
  }
  30% {
    transform: translateY(-10px);
    opacity: 1;
  }
}

@media (max-width: 768px) {
  .ai-chatbot-widget {
    bottom: 16px;
    right: 16px;
  }
  
  .chatbot-window {
    width: calc(100vw - 32px);
    height: 500px;
    right: -8px;
  }
  
  .chatbot-toggle {
    width: 56px;
    height: 56px;
  }
}
</style>

<script>
// AI Chatbot Widget JavaScript
(function() {
  const chatbotToggle = document.getElementById('chatbot-toggle');
  const chatbotWindow = document.getElementById('chatbot-window');
  const closeChatbot = document.getElementById('close-chatbot');
  const minimizeChatbot = document.getElementById('minimize-chatbot');
  const chatbotInput = document.getElementById('chatbot-input-field');
  const sendBtn = document.getElementById('chatbot-send-btn');
  const messagesContainer = document.getElementById('chatbot-messages');
  
  // Toggle chatbot window
  chatbotToggle?.addEventListener('click', function() {
    chatbotWindow.classList.toggle('open');
    if (chatbotWindow.classList.contains('open')) {
      chatbotInput?.focus();
    }
  });
  
  // Close chatbot
  closeChatbot?.addEventListener('click', function() {
    chatbotWindow.classList.remove('open');
  });
  
  // Minimize chatbot
  minimizeChatbot?.addEventListener('click', function() {
    chatbotWindow.classList.remove('open');
  });
  
  // Send message
  function sendMessage() {
    const message = chatbotInput?.value.trim();
    if (!message) return;
    
    // Add user message
    addMessage(message, 'user');
    chatbotInput.value = '';
    
    // Show typing indicator
    showTypingIndicator();
    
    // Simulate AI response
    setTimeout(() => {
      hideTypingIndicator();
      const response = getAIResponse(message);
      addMessage(response, 'bot');
    }, 1500);
  }
  
  sendBtn?.addEventListener('click', sendMessage);
  
  chatbotInput?.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      sendMessage();
    }
  });
  
  // Suggestion chips
  document.querySelectorAll('.suggestion-chip').forEach(chip => {
    chip.addEventListener('click', function() {
      const message = this.getAttribute('data-message');
      chatbotInput.value = message;
      sendMessage();
    });
  });
  
  // Add message to chat
  function addMessage(text, type) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `chat-message ${type}`;
    
    const avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    avatar.innerHTML = type === 'bot' ? '<i class="fa-solid fa-robot"></i>' : '<i class="fa-solid fa-user"></i>';
    
    const content = document.createElement('div');
    content.className = 'message-content';
    
    const textP = document.createElement('p');
    textP.textContent = text;
    
    const time = document.createElement('span');
    time.className = 'message-time';
    time.textContent = 'Just now';
    
    content.appendChild(textP);
    content.appendChild(time);
    
    messageDiv.appendChild(avatar);
    messageDiv.appendChild(content);
    
    // Remove suggestions if they exist
    const suggestions = messagesContainer.querySelector('.chat-suggestions');
    if (suggestions) {
      suggestions.remove();
    }
    
    messagesContainer.appendChild(messageDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }
  
  // Show typing indicator
  function showTypingIndicator() {
    const typing = document.createElement('div');
    typing.className = 'chat-message bot typing-message';
    typing.innerHTML = `
      <div class="message-avatar">
        <i class="fa-solid fa-robot"></i>
      </div>
      <div class="typing-indicator">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    `;
    messagesContainer.appendChild(typing);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }
  
  // Hide typing indicator
  function hideTypingIndicator() {
    const typing = messagesContainer.querySelector('.typing-message');
    if (typing) {
      typing.remove();
    }
  }
  
  // Get AI response (mock responses)
  function getAIResponse(message) {
    const lowerMessage = message.toLowerCase();
    
    if (lowerMessage.includes('recommend') || lowerMessage.includes('course')) {
      return "Based on your progress, I recommend 'Advanced Python Programming' and 'Data Structures & Algorithms'. These will complement your current skills perfectly!";
    } else if (lowerMessage.includes('progress') || lowerMessage.includes('doing')) {
      return "You're doing great! You've completed 72% of your challenges and are on a 15-day streak. Keep it up!";
    } else if (lowerMessage.includes('next') || lowerMessage.includes('learn')) {
      return "I suggest focusing on System Design next. It's a crucial skill that builds on your current knowledge of Python and Data Structures.";
    } else if (lowerMessage.includes('help') || lowerMessage.includes('challenge')) {
      return "I'd be happy to help! Which specific challenge are you working on? I can provide hints, explain concepts, or walk you through the solution.";
    } else if (lowerMessage.includes('hello') || lowerMessage.includes('hi')) {
      return "Hello! How can I assist you with your learning journey today?";
    } else {
      return "That's a great question! I'm here to help you with course recommendations, progress tracking, learning guidance, and answering questions about your courses. What would you like to know more about?";
    }
  }
})();
</script>
