<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-page">
    <div class="form-container">
        <h2>Login to Your Account</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flashes">
            {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        <p class="quote">"Consistency is the key — keep learning, keep growing!"</p>
        <form method="POST" id="login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="text" name="identifier" id="identifier" placeholder="Enter Username" required>
            <div class="pw-row">
                <input type="password" name="password" id="login-password" placeholder="Enter Password" required>
                <button type="button" class="toggle-password" data-target="login-password" aria-pressed="false" aria-label="Show password"></button>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <p>Don’t have an account? <a href="/signup">Sign up here</a></p>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</body>
</html>
